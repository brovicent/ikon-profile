<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Hub</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }

    .streaming-card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .streaming-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .streaming-card:active {
      transform: scale(0.98);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .glow-dot {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.active { display: flex; }

    .btn-add-gradient {
      background: linear-gradient(135deg, #e50914, #ff3d47);
    }

    img {
      max-width: 85%;
      height: auto;
      object-fit: contain;
    }

    /* Floating Add Button style */
    .mini-add-btn {
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .mini-add-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: rotate(90deg);
      border-color: rgba(255, 255, 255, 0.3);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="bg-[#080808] text-white overflow-x-hidden">

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop px-4">
   <div class="bg-[#121212] border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <h3 class="text-2xl font-bold mb-6">Tambah Layanan</h3>
    <form id="add-service-form" class="space-y-4">
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">Nama Layanan</label>
      <input type="text" id="service-name" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500" placeholder="Contoh: HBO Max" required>
     </div>
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">URL Website</label>
      <input type="url" id="service-url" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500" placeholder="https://..." required>
     </div>
     <div class="flex gap-3 pt-4">
      <button type="button" id="cancel-btn" class="flex-1 py-3 rounded-lg font-bold bg-white/5 hover:bg-white/10 transition">Batal</button>
      <button type="submit" class="flex-1 py-3 rounded-lg font-bold btn-add-gradient hover:opacity-90 transition">Tambah</button>
     </div>
    </form>
   </div>
  </div>

  <main id="app-wrapper" class="relative min-h-screen">
   <!-- Dekorasi Cahaya Ambient -->
   <div class="glow-dot w-[500px] h-[500px] bg-red-600 -top-40 -left-40"></div>
   <div class="glow-dot w-[400px] h-[400px] bg-blue-600 -bottom-20 -right-20"></div>

   <div class="max-w-6xl mx-auto px-6 py-8 relative z-10">
    <!-- Header (Jam dan Mini Add Button) -->
    <header class="flex items-center justify-end mb-8 gap-4">
     <button id="add-btn" class="mini-add-btn w-10 h-10 rounded-xl flex items-center justify-center" title="Tambah Layanan Baru">
      <i data-lucide="plus" class="w-5 h-5 text-gray-400"></i>
     </button>
     <div id="clock" class="text-lg font-mono font-bold text-gray-400 bg-white/5 px-5 py-2 rounded-2xl border border-white/5">00:00</div>
    </header>

    <!-- Grid Layanan Streaming -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 pt-4" id="streaming-grid">
     
     <!-- Netflix -->
     <a href="https://www.netflix.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #1a0a0a, #080808); animation-delay: 0.1s">
      <div class="card-inner p-8">
       <img src="https://raw.githubusercontent.com/brovicent/ikon-profile/refs/heads/main/netflix.png" alt="Logo Netflix" class="w-36 mb-2">
      </div>
     </a>

     <!-- Prime Video -->
     <a href="https://www.primevideo.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #001e2e, #000c14); animation-delay: 0.2s">
      <div class="card-inner p-8">
       <img src="https://raw.githubusercontent.com/brovicent/ikon-profile/refs/heads/main/Amazon%20Prime.png" alt="Logo Prime Video" class="w-36">
      </div>
     </a>

     <!-- Disney+ -->
     <a href="https://www.disneyplus.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #021e4d, #010a1a); animation-delay: 0.3s">
      <div class="card-inner p-8">
       <img src="https://raw.githubusercontent.com/brovicent/ikon-profile/8409724bc6b017f615761e9e5f7d62546da6947b/Disney_wordmark.svg" alt="Logo Disney+" class="w-36">
      </div>
     </a>

     <!-- YouTube -->
     <a href="https://www.youtube.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #2a0000, #080808); animation-delay: 0.4s">
      <div class="card-inner p-8">
       <div class="w-20 h-14 bg-red-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-red-600/10">
        <svg viewBox="0 0 24 24" class="w-8 h-8 fill-white"><path d="M8 5v14l11-7z"/></svg>
       </div>
       <span class="text-xl font-black tracking-tighter">YouTube</span>
      </div>
     </a>

     <!-- Crunchyroll -->
     <a href="https://www.crunchyroll.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #2e1a00, #080808); animation-delay: 0.5s">
      <div class="card-inner p-8">
       <div class="w-16 h-16 rounded-full border-[6px] border-[#F47521] relative mb-3 flex items-center justify-center shadow-lg shadow-orange-600/10">
        <div class="w-8 h-8 rounded-full border-4 border-[#F47521]"></div>
        <div class="absolute right-0 top-1 w-4 h-4 rounded-full bg-[#F47521]"></div>
       </div>
       <span class="text-sm font-bold text-[#F47521] uppercase tracking-widest">Crunchyroll</span>
      </div>
     </a>

     <!-- We TV -->
     <a href="https://wetv.vip" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #001b2e, #080808); animation-delay: 0.6s">
      <div class="card-inner p-8">
       <div class="flex flex-col">
        <span class="text-4xl font-black leading-none bg-gradient-to-r from-orange-500 via-green-400 to-blue-500 bg-clip-text text-transparent">We</span>
        <span class="text-3xl font-black leading-none text-white ml-6 italic">TV</span>
       </div>
      </div>
     </a>

     <!-- Viu -->
     <a href="https://www.viu.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #2e2800, #080808); animation-delay: 0.7s">
      <div class="card-inner p-8">
       <div class="bg-[#FFD300] text-black font-black text-4xl px-4 py-1 rounded-xl shadow-lg shadow-yellow-500/20 transform -rotate-2">Viu</div>
       <span class="mt-4 text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Asian Content</span>
      </div>
     </a>

    </div>

    <!-- Footer -->
    <footer class="mt-20 text-center opacity-30">
     <p class="text-sm font-medium">Akses Cepat Layanan Streaming &copy; 2024</p>
    </footer>
   </div>
  </main>

  <script>
    // Inisialisasi Ikon
    lucide.createIcons();

    // Logika Jam
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
      document.getElementById('clock').textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Logika Modal
    const modal = document.getElementById('modal-backdrop');
    const addBtn = document.getElementById('add-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const form = document.getElementById('add-service-form');

    addBtn.addEventListener('click', () => {
      modal.classList.add('active');
      document.getElementById('service-name').focus();
    });

    cancelBtn.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('service-name').value;
      const url = document.getElementById('service-url').value;
      
      const grid = document.getElementById('streaming-grid');
      const newCard = document.createElement('a');
      newCard.href = url;
      newCard.target = "_blank";
      newCard.className = "streaming-card rounded-[2.5rem] aspect-square flex items-center justify-center bg-white/5 animate-fade-in-up";
      newCard.innerHTML = `
        <div class="card-inner p-8">
          <span class="text-xl font-black uppercase tracking-tighter text-center">${name}</span>
        </div>
      `;
      
      grid.appendChild(newCard);
      modal.classList.remove('active');
      form.reset();
    });

    // Tutup modal saat klik di luar
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });
  </script>
 </body>
</html>
