<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Hub</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }

    .streaming-card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .streaming-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .streaming-card:active {
      transform: scale(0.98);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
    }

    .delete-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      width: 2rem;
      height: 2rem;
      border-radius: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s;
      z-index: 20;
    }
    .streaming-card:hover .delete-btn {
      opacity: 1;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .glow-dot {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.active { display: flex; }

    .btn-add-gradient {
      background: linear-gradient(135deg, #e50914, #ff3d47);
    }

    /* Ukuran Logo Diperbesar */
    img.service-logo {
      max-width: 90%;
      max-height: 75%; /* Diperbesar dari 50% ke 75% */
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .mini-add-btn {
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .mini-add-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: rotate(90deg);
      border-color: rgba(255, 255, 255, 0.3);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="bg-[#080808] text-white overflow-x-hidden">

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop px-4">
   <div class="bg-[#121212] border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <h3 class="text-2xl font-bold mb-6">Tambah Layanan</h3>
    <form id="add-service-form" class="space-y-4">
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">Nama Layanan</label>
      <input type="text" id="service-name" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500 text-white" placeholder="Contoh: Vidio" required>
     </div>
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">URL Website</label>
      <input type="url" id="service-url" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500 text-white" placeholder="https://..." required>
     </div>
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">Link Logo (URL Gambar)</label>
      <input type="url" id="service-logo" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500 text-white" placeholder="https://contoh.com/logo.png">
     </div>
     <div class="flex gap-3 pt-4">
      <button type="button" id="cancel-btn" class="flex-1 py-3 rounded-lg font-bold bg-white/5 hover:bg-white/10 transition">Batal</button>
      <button type="submit" id="submit-btn" class="flex-1 py-3 rounded-lg font-bold btn-add-gradient hover:opacity-90 transition">Simpan</button>
     </div>
    </form>
   </div>
  </div>

  <main id="app-wrapper" class="relative min-h-screen">
   <div class="glow-dot w-[500px] h-[500px] bg-red-600 -top-40 -left-40"></div>
   <div class="glow-dot w-[400px] h-[400px] bg-blue-600 -bottom-20 -right-20"></div>

   <div class="max-w-6xl mx-auto px-6 py-8 relative z-10">
    <header class="flex items-center justify-end mb-8 gap-4">
     <button id="add-btn" class="mini-add-btn w-10 h-10 rounded-xl flex items-center justify-center" title="Tambah Layanan Baru">
      <i data-lucide="plus" class="w-5 h-5 text-gray-400"></i>
     </button>
     <div id="clock" class="text-lg font-mono font-bold text-gray-400 bg-white/5 px-5 py-2 rounded-2xl border border-white/5">00:00</div>
    </header>

    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 pt-4" id="streaming-grid"></div>

    <footer class="mt-20 text-center opacity-30">
     <p class="text-sm font-medium">Layanan Tersimpan di Cloud &copy; 2024</p>
    </footer>
   </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'streaming-hub-v1';

    let user = null;

    const initAuth = async () => {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        await signInWithCustomToken(auth, __initial_auth_token);
      } else {
        await signInAnonymously(auth);
      }
    };

    onAuthStateChanged(auth, (u) => {
      user = u;
      if (user) startSync();
    });

    initAuth();

    function startSync() {
      if (!user) return;
      const servicesRef = collection(db, 'artifacts', appId, 'public', 'data', 'streaming_services');
      onSnapshot(servicesRef, (snapshot) => {
        const services = [];
        snapshot.forEach((doc) => services.push({ id: doc.id, ...doc.data() }));
        services.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        if (services.length === 0) seedInitialData(); else renderGrid(services);
      });
    }

    function renderGrid(services) {
      const grid = document.getElementById('streaming-grid');
      grid.innerHTML = '';

      services.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = "streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up relative";
        card.style.animationDelay = `${i * 0.05}s`;
        card.style.background = s.bg || "linear-gradient(145deg, #1a1a1a, #080808)";

        // Gunakan kelas service-logo untuk ukuran yang diperbesar
        const content = s.logo 
          ? `<img src="${s.logo}" alt="${s.name}" class="service-logo">`
          : `<span class="text-xl font-black uppercase tracking-tighter text-center px-4">${s.name}</span>`;

        card.innerHTML = `
          <button class="delete-btn" title="Hapus">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
          <a href="${s.url}" target="_blank" class="card-inner p-4">
            ${content}
          </a>
        `;

        card.querySelector('.delete-btn').addEventListener('click', async (e) => {
          e.preventDefault();
          if (confirm(`Hapus layanan ${s.name}?`)) {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'streaming_services', s.id));
          }
        });

        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    const form = document.getElementById('add-service-form');
    const modal = document.getElementById('modal-backdrop');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!user) return;
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = "Menyimpan...";
      const name = document.getElementById('service-name').value;
      const url = document.getElementById('service-url').value;
      const logo = document.getElementById('service-logo').value;
      const newId = crypto.randomUUID();
      try {
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'streaming_services', newId), {
          name, url, logo, createdAt: Date.now()
        });
        modal.classList.remove('active');
        form.reset();
      } catch (err) { console.error(err); } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Simpan";
      }
    });

    async function seedInitialData() {
      const initial = [
        { name: "Netflix", url: "https://www.netflix.com", logo: "https://raw.githubusercontent.com/brovicent/ikon-profile/refs/heads/main/netflix.png", bg: "linear-gradient(145deg, #1a0a0a, #080808)" },
        { name: "Prime Video", url: "https://www.primevideo.com", logo: "https://raw.githubusercontent.com/brovicent/ikon-profile/refs/heads/main/Amazon%20Prime.png", bg: "linear-gradient(145deg, #001e2e, #000c14)" },
        { name: "Disney+", url: "https://www.disneyplus.com", logo: "https://raw.githubusercontent.com/brovicent/ikon-profile/8409724bc6b017f615761e9e5f7d62546da6947b/Disney_wordmark.svg", bg: "linear-gradient(145deg, #021e4d, #010a1a)" }
      ];
      for (const item of initial) {
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'streaming_services', crypto.randomUUID()), { ...item, createdAt: Date.now() });
      }
    }

    document.getElementById('add-btn').addEventListener('click', () => modal.classList.add('active'));
    document.getElementById('cancel-btn').addEventListener('click', () => modal.classList.remove('active'));
    
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
 </body>
</html>
