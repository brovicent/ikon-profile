<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Hub Premium</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background: #050505; color: white; }

    /* Background Nebula Effect */
    .nebula-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at 20% 30%, rgba(229, 9, 20, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(0, 168, 225, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .streaming-card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }
    .streaming-card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
    }
    .streaming-card:active {
      transform: scale(0.98);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
    }

    .delete-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s;
      z-index: 20;
    }
    .streaming-card:hover .delete-btn { opacity: 1; }

    img.service-logo {
      max-width: 85%;
      max-height: 70%;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }

    /* Filter khusus untuk logo Disney agar berwarna putih */
    .disney-filter {
      filter: brightness(0) invert(1) drop-shadow(0 5px 10px rgba(255,255,255,0.1)) !important;
    }

    .mini-add-btn {
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }
    .mini-add-btn:hover { 
      background: rgba(255, 255, 255, 0.15); 
      transform: rotate(90deg); 
      color: white;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(15px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.active { display: flex; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-item { animation: fadeInUp 0.5s ease-out forwards; }

    .clock-display {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="overflow-x-hidden">

  <!-- Background Effect -->
  <div class="nebula-bg"></div>

  <!-- Modal Tambah Layanan -->
  <div id="modal-backdrop" class="modal-backdrop px-4">
   <div class="bg-[#111] border border-white/10 rounded-[2rem] p-8 w-full max-w-md shadow-2xl">
    <h3 class="text-2xl font-bold mb-6 tracking-tight">Tambah Layanan</h3>
    <form id="add-service-form" class="space-y-5">
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1.5">Nama Layanan</label>
      <input type="text" id="service-name" class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="Vidio, HBO, dll" required>
     </div>
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1.5">URL Website</label>
      <input type="url" id="service-url" class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="https://..." required>
     </div>
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1.5">Link Logo (URL Gambar)</label>
      <input type="url" id="service-logo" class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="https://...">
     </div>
     <div class="flex gap-3 pt-4">
      <button type="button" id="cancel-btn" class="flex-1 py-4 rounded-xl font-bold bg-white/5 hover:bg-white/10 transition-all text-gray-300">Batal</button>
      <button type="submit" id="submit-btn" class="flex-1 py-4 rounded-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 shadow-lg shadow-blue-600/20 transition-all">Simpan</button>
     </div>
    </form>
   </div>
  </div>

  <main id="app-wrapper" class="relative min-h-screen z-10">
   <div class="max-w-6xl mx-auto px-6 py-10">
    <header class="flex items-center justify-end mb-16 gap-4">
     <button id="add-btn" class="mini-add-btn w-12 h-12 rounded-2xl flex items-center justify-center text-gray-400" title="Tambah Layanan Baru">
      <i data-lucide="plus" class="w-6 h-6"></i>
     </button>
     <div id="clock" class="clock-display text-xl font-mono font-bold text-gray-300 px-7 py-2.5 rounded-2xl">00:00</div>
    </header>

    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-8" id="streaming-grid">
      <!-- Layanan akan dimuat di sini -->
    </div>

    <footer class="mt-24 text-center">
     <p class="text-xs font-bold tracking-[0.2em] text-gray-600 uppercase">Streaming Hub Premium &bull; Local Storage Mode</p>
    </footer>
   </div>
  </main>

  <script>
    const STORAGE_KEY = 'streaming_hub_local_data_premium';

    // Data Default
    const defaultServices = [
      { id: '1', name: "Netflix", url: "https://www.netflix.com", logo: "https://raw.githubusercontent.com/brovicent/ikon-profile/refs/heads/main/netflix.png" },
      { id: '2', name: "Prime Video", url: "https://www.primevideo.com", logo: "https://raw.githubusercontent.com/brovicent/ikon-profile/refs/heads/main/Amazon%20Prime.png" },
      { id: '3', name: "Disney+", url: "https://www.disneyplus.com", logo: "https://raw.githubusercontent.com/brovicent/ikon-profile/8409724bc6b017f615761e9e5f7d62546da6947b/Disney_wordmark.svg" }
    ];

    let currentServices = [];

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          currentServices = JSON.parse(saved);
        } catch (e) {
          currentServices = [...defaultServices];
        }
      } else {
        currentServices = [...defaultServices];
        saveData();
      }
      renderGrid();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(currentServices));
    }

    function renderGrid() {
      const grid = document.getElementById('streaming-grid');
      grid.innerHTML = '';

      if (currentServices.length === 0) {
        grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-600 font-medium">Klik tombol tambah untuk memulai daftar Anda.</div>`;
        return;
      }

      currentServices.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = `streaming-card rounded-[3rem] aspect-square relative animate-item`;
        card.style.animationDelay = `${i * 0.08}s`;

        // Logika khusus: Jika namanya mengandung "disney", berikan class disney-filter
        const isDisney = s.name.toLowerCase().includes('disney');
        const logoClass = isDisney ? 'service-logo disney-filter' : 'service-logo';

        const content = s.logo 
          ? `<img src="${s.logo}" alt="${s.name}" class="${logoClass}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
             <span class="text-xl font-bold uppercase hidden">${s.name}</span>`
          : `<span class="text-2xl font-black uppercase tracking-tight text-center px-6">${s.name}</span>`;

        card.innerHTML = `
          <button class="delete-btn" title="Hapus"><i data-lucide="x" class="w-5 h-5"></i></button>
          <a href="${s.url}" target="_blank" class="card-inner p-6">${content}</a>
        `;

        card.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.preventDefault();
          if (confirm(`Hapus layanan ${s.name}?`)) {
            currentServices = currentServices.filter(item => item.id !== s.id);
            saveData();
            renderGrid();
          }
        });

        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    const form = document.getElementById('add-service-form');
    const modal = document.getElementById('modal-backdrop');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('service-name').value;
      const url = document.getElementById('service-url').value;
      const logo = document.getElementById('service-logo').value;

      currentServices.push({
        id: Date.now().toString(),
        name, url, logo,
        createdAt: Date.now()
      });

      saveData();
      renderGrid();
      modal.classList.remove('active');
      form.reset();
    });

    document.getElementById('add-btn').addEventListener('click', () => modal.classList.add('active'));
    document.getElementById('cancel-btn').addEventListener('click', () => {
      modal.classList.remove('active');
      form.reset();
    });
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    setInterval(updateClock, 1000);
    updateClock();
    loadData();
    lucide.createIcons();
  </script>
 </body>
</html>
