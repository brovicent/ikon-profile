<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Hub Premium</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }

    .streaming-card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .streaming-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .streaming-card:active {
      transform: scale(0.98);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .glow-dot {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.2;
      pointer-events: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.active { display: flex; }

    .btn-add-gradient {
      background: linear-gradient(135deg, #e50914, #ff3d47);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="bg-[#080808] text-white overflow-x-hidden">

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop px-4">
   <div class="bg-[#121212] border border-white/10 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <h3 class="text-2xl font-bold mb-6">Add Service</h3>
    <form id="add-service-form" class="space-y-4">
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">Service Name</label>
      <input type="text" id="service-name" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500" placeholder="e.g. HBO Max" required>
     </div>
     <div>
      <label class="block text-sm font-semibold text-gray-400 mb-1">URL</label>
      <input type="url" id="service-url" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-red-500" placeholder="https://..." required>
     </div>
     <div class="flex gap-3 pt-4">
      <button type="button" id="cancel-btn" class="flex-1 py-3 rounded-lg font-bold bg-white/5 hover:bg-white/10 transition">Cancel</button>
      <button type="submit" class="flex-1 py-3 rounded-lg font-bold btn-add-gradient hover:opacity-90 transition">Add Now</button>
     </div>
    </form>
   </div>
  </div>

  <main id="app-wrapper" class="relative min-h-screen">
   <!-- Ambient Glows -->
   <div class="glow-dot w-[500px] h-[500px] bg-red-600 -top-40 -left-40"></div>
   <div class="glow-dot w-[400px] h-[400px] bg-blue-600 -bottom-20 -right-20"></div>

   <div class="max-w-6xl mx-auto px-6 py-12 relative z-10">
    <!-- Header -->
    <header class="flex items-center justify-between mb-12">
     <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-red-600 to-orange-500 flex items-center justify-center shadow-lg shadow-red-600/20">
       <i data-lucide="play" class="fill-white text-white w-6 h-6 ml-1"></i>
      </div>
      <h1 class="text-2xl font-black tracking-tighter">STREAM HUB</h1>
     </div>
     <div id="clock" class="text-lg font-mono font-bold text-gray-500 bg-white/5 px-4 py-1 rounded-full border border-white/5">00:00</div>
    </header>

    <!-- Hero -->
    <section class="mb-12 animate-fade-in-up" style="animation-delay: 0.1s">
     <h2 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-4">
      Ready to <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-purple-500 to-blue-500">Stream?</span>
     </h2>
     <p class="text-gray-400 text-lg font-medium">Select your preferred platform below.</p>
    </section>

    <!-- Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6" id="streaming-grid">
     
     <!-- Netflix -->
     <a href="https://www.netflix.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #1a0a0a, #080808); animation-delay: 0.2s">
      <div class="card-inner p-8">
       <svg viewBox="0 0 111 30" class="w-32 mb-4" fill="#E50914">
        <path d="M105.062 14.28L111 30c-1.75-.25-3.499-.563-5.28-.845l-3.345-8.686-3.437 7.969c-1.687-.282-3.344-.376-5.031-.595l6.093-13.874L94.999 0H100.312l3.064 7.594L106.47 0h5.063l-6.47 14.28zM90.47 0h-4.594v27.25c1.5.094 3.062.156 4.594.343V0zM79.656 0v2.5H74.5V28.97c1.469.188 2.969.344 4.469.5V2.5h5.156V0h-4.469zM69.25 7.875c-2.063 0-3.407.875-4.157 2.188V.001h-4.593V29.72c1.469.125 2.937.313 4.406.5V14.626c0-1.782.782-3.126 2.594-3.126 1.719 0 2.406 1.126 2.406 3.126V30.28c1.532.063 3.063.188 4.594.375V13.78c0-3.655-1.936-5.905-5.25-5.905zM54.063 7.875c-4.94 0-7.22 3.782-7.22 8.876v3.53c0 5.157 1.876 8.876 7.22 8.876 5.282 0 7.157-3.72 7.157-8.876v-3.53c0-5.094-1.875-8.876-7.157-8.876zm2.562 12.406c0 3.126-.813 5.126-2.562 5.126-1.813 0-2.626-2-2.626-5.126V16.47c0-3.094.813-5.094 2.626-5.094 1.75 0 2.562 2 2.562 5.094v3.812zM38.876 7.875c-2.75 0-4.344 1.656-5.125 3.375V.001H29.25V27.94c1.469 0 2.937.031 4.406.094V14.626c0-1.78.688-3.125 2.5-3.125 1.75 0 2.438 1.125 2.438 3.125v13.75c1.5.063 3.031.156 4.562.281V13.78c0-3.655-2-5.905-4.28-5.905zM20.937 7.875c-4.938 0-7.218 3.782-7.218 8.876v3.53c0 5.157 1.874 8.876 7.218 8.876 5.282 0 7.157-3.72 7.157-8.876v-3.53c0-5.094-1.875-8.876-7.157-8.876zm2.563 12.406c0 3.126-.813 5.126-2.563 5.126-1.812 0-2.625-2-2.625-5.126V16.47c0-3.094.813-5.094 2.625-5.094 1.75 0 2.563 2 2.563 5.094v3.812zM9.438 0H4.843v16.375L0 0v27.156c1.5.156 3 .281 4.5.438V10.5l5.281 17.719c1.406.188 2.844.375 4.25.594V0H9.437z"/>
       </svg>
       <span class="text-[10px] tracking-[0.3em] font-black uppercase text-red-600">Premium</span>
      </div>
     </a>

     <!-- Prime Video -->
     <a href="https://www.primevideo.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #001e2e, #000c14); animation-delay: 0.3s">
      <div class="card-inner p-8">
       <svg viewBox="0 0 100 30" class="w-32 mb-2" fill="white">
        <path d="M12.4 13.5c0 4-2 6.3-5.3 6.3h-2.1v-6.3h2.1c3.3 0 5.3 2.3 5.3 6.3zm2.5 0c0-5.2-3.1-8.5-7.8-8.5h-4.6v17h2.5v-6.2h2.1c4.7 0 7.8-3.3 7.8-8.5v6.2z"/>
        <path d="M21 8.5v3h1v-3h-1zm.5-3c.8 0 1.5.7 1.5 1.5s-.7 1.5-1.5 1.5-1.5-.7-1.5-1.5.7-1.5 1.5-1.5z" fill="#00A8E1"/>
        <path d="M10 24c15 6 45 6 60 0-5 3-15 5-30 5s-25-2-30-5z" fill="#00A8E1"/>
       </svg>
       <span class="text-[11px] font-bold text-sky-400">Prime Video</span>
      </div>
     </a>

     <!-- Disney+ -->
     <a href="https://www.disneyplus.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #021e4d, #010a1a); animation-delay: 0.4s">
      <div class="card-inner p-8">
       <div class="relative w-full flex flex-col items-center">
        <svg viewBox="0 0 100 40" class="w-28 mb-1" fill="white">
            <path d="M22 15c-5 0-9 4-9 9s4 9 9 9 9-4 9-9-4-9-9-9zM45 5h-4v28h4v-28zM60 15h4v18h-4v-18z"/>
            <path d="M10 10 Q 50 0 90 10" fill="none" stroke="#00A8E1" stroke-width="2"/>
        </svg>
        <span class="font-black italic text-2xl tracking-tighter">Disney<span class="text-sky-400 font-bold ml-1">+</span></span>
       </div>
      </div>
     </a>

     <!-- YouTube -->
     <a href="https://www.youtube.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #2a0000, #080808); animation-delay: 0.5s">
      <div class="card-inner p-8">
       <div class="w-16 h-12 bg-red-600 rounded-2xl flex items-center justify-center mb-3">
        <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M8 5v14l11-7z"/></svg>
       </div>
       <span class="text-xl font-black tracking-tighter">YouTube</span>
      </div>
     </a>

     <!-- Crunchyroll -->
     <a href="https://www.crunchyroll.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #2e1a00, #080808); animation-delay: 0.6s">
      <div class="card-inner p-8">
       <div class="w-16 h-16 rounded-full border-[6px] border-[#F47521] relative mb-3 flex items-center justify-center">
        <div class="w-8 h-8 rounded-full border-4 border-[#F47521]"></div>
        <div class="absolute right-0 top-1 w-4 h-4 rounded-full bg-[#F47521]"></div>
       </div>
       <span class="text-sm font-bold text-[#F47521] uppercase tracking-widest">Crunchyroll</span>
      </div>
     </a>

     <!-- We TV -->
     <a href="https://wetv.vip" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #001b2e, #080808); animation-delay: 0.7s">
      <div class="card-inner p-8">
       <div class="flex flex-col">
        <span class="text-4xl font-black leading-none bg-gradient-to-r from-orange-500 via-green-400 to-blue-500 bg-clip-text text-transparent">We</span>
        <span class="text-3xl font-black leading-none text-white ml-6 italic">TV</span>
       </div>
      </div>
     </a>

     <!-- Viu -->
     <a href="https://www.viu.com" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #2e2800, #080808); animation-delay: 0.8s">
      <div class="card-inner p-8">
       <div class="bg-[#FFD300] text-black font-black text-4xl px-4 py-1 rounded-xl shadow-lg shadow-yellow-500/20 transform -rotate-2">Viu</div>
       <span class="mt-4 text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Asian Content</span>
      </div>
     </a>

     <!-- Bstation -->
     <a href="https://www.bilibili.tv" target="_blank" class="streaming-card rounded-[2.5rem] aspect-square animate-fade-in-up" style="background: linear-gradient(145deg, #001a2e, #080808); animation-delay: 0.9s">
      <div class="card-inner p-8">
       <div class="relative mb-3">
        <div class="w-16 h-12 bg-[#00A1D6] rounded-2xl flex items-center justify-center border-4 border-white/20">
            <div class="flex gap-2">
                <div class="w-2 h-2 rounded-full bg-white"></div>
                <div class="w-2 h-2 rounded-full bg-white"></div>
            </div>
        </div>
        <div class="absolute -top-3 left-2 w-4 h-1 bg-[#00A1D6] rotate-[-45deg]"></div>
        <div class="absolute -top-3 right-2 w-4 h-1 bg-[#00A1D6] rotate-[45deg]"></div>
       </div>
       <span class="text-lg font-bold text-[#00A1D6]">Bstation</span>
      </div>
     </a>

     <!-- Add Button -->
     <button id="add-btn" class="streaming-card rounded-[2.5rem] aspect-square flex flex-col items-center justify-center bg-white/5 border-2 border-dashed border-white/10 hover:border-white/30 transition-all animate-fade-in-up" style="animation-delay: 1s">
      <div class="w-14 h-14 rounded-full bg-white/10 flex items-center justify-center mb-3">
       <i data-lucide="plus" class="w-8 h-8 text-white/50"></i>
      </div>
      <span class="text-sm font-bold text-white/40 uppercase tracking-widest">Add More</span>
     </button>

    </div>

    <!-- Footer -->
    <footer class="mt-20 text-center opacity-40">
     <p class="text-sm font-medium">Developed for Ultimate Streaming Experience &copy; 2024</p>
    </footer>
   </div>
  </main>

  <script>
    // Initialize Icons
    lucide.createIcons();

    // Clock Logic
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
      document.getElementById('clock').textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Modal Logic
    const modal = document.getElementById('modal-backdrop');
    const addBtn = document.getElementById('add-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const form = document.getElementById('add-service-form');

    addBtn.addEventListener('click', () => {
      modal.classList.add('active');
      document.getElementById('service-name').focus();
    });

    cancelBtn.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('service-name').value;
      const url = document.getElementById('service-url').value;
      
      // Simulating adding service
      const grid = document.getElementById('streaming-grid');
      const newCard = document.createElement('a');
      newCard.href = url;
      newCard.target = "_blank";
      newCard.className = "streaming-card rounded-[2.5rem] aspect-square flex items-center justify-center bg-white/5";
      newCard.innerHTML = `
        <div class="card-inner p-8">
          <span class="text-2xl font-black uppercase tracking-tighter">${name}</span>
        </div>
      `;
      
      grid.insertBefore(newCard, addBtn);
      modal.classList.remove('active');
      form.reset();
    });

    // Close modal on click outside
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });
  </script>
 </body>
</html>
